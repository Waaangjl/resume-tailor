# Secrets — copy this file to `secrets.yaml` (gitignored) and fill in your keys.
#
# Alternative: set these as env vars (ADZUNA_APP_ID, ADZUNA_APP_KEY).
# Env vars take precedence over secrets.yaml.

adzuna:
  app_id:  "your_app_id_here"   # short alphanumeric, e.g. "1cdc6071"
  app_key: "your_app_key_here"  # long hex string
